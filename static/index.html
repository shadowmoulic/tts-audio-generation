<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coqui Studio | AI Voice Narrative</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🐸</span>
                <h1>Coqui <span>Studio</span></h1>
            </div>
            <div class="status-badge" id="server-status">
                <span class="dot"></span> System Ready
            </div>
        </header>

        <section class="api-section">
            <div class="api-card">
                <i data-lucide="key" class="icon-small"></i>
                <input type="password" id="groq-api-key" placeholder="Enter your Groq API Key..." title="Your key is only used for this session and not stored.">
            </div>
        </section>

        <main>
            <section class="editor-section">
                <div class="toolbar">
                    <button id="btn-fix-tags" class="btn secondary">
                        <span class="icon">✨</span> AI Optimize Text
                    </button>
                    <button id="btn-save" class="btn secondary">
                        <span class="icon">💾</span> Save Script
                    </button>
                </div>
                <textarea id="text-input" placeholder="Enter your story here... The AI will help you optimize it for natural-sounding narration."></textarea>
            </section>

            <section class="control-section">
                <div class="voice-controls">
                    <label for="ref-voice-upload" class="upload-label">
                        <span class="icon">🎙️</span> Upload Reference Voice (Required for Cloning)
                    </label>
                    <input type="file" id="ref-voice-upload" accept="audio/*">
                    <div id="upload-status" class="status-text">Please upload a .wav or .mp3 sample</div>
                </div>

                <button id="btn-generate" class="btn primary">
                    <span class="icon">⚡</span> Generate Audio
                </button>
                
                <div id="audio-player-container" class="hidden">
                    <audio id="audio-player" controls></audio>
                    <a id="download-link" href="#" download class="btn outline">Download Wav</a>
                </div>
            </section>

            <section class="console-section">
                <div class="console-header">
                    <h3><span class="icon">💻</span> System Console</h3>
                    <button id="btn-clear-console" class="text-btn">Clear</button>
                </div>
                <div id="console-output" class="console-body">
                    <div class="log-line info">Welcome to Coqui Studio. Upload a voice profile to begin.</div>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by <strong>Coqui XTTS v2</strong> & <strong>Groq Llama 3</strong></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
